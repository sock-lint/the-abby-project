services:
  # Infrastructure — long-lived
  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-summerforge}
      POSTGRES_USER: ${POSTGRES_USER:-summerforge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-summerforge}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    expose:
      - "5432"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    expose:
      - "6379"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Application — rebuilt on deploy.
  # Serves the Django REST API, the built React SPA, AND the MCP
  # Streamable HTTP endpoint at /mcp — all on the same origin (:8000).
  # MCP is mounted inside ``config.asgi`` so there's no separate process
  # and no reverse-proxy changes are needed.
  #
  # Routing note for Traefik/Coolify:
  #   The Coolify-auto-generated router for this service (Host rule on the
  #   public FQDN, e.g. ``abby.bos.lol``) already forwards ``/mcp`` and
  #   ``/mcp/...`` to this container unmodified. DO NOT:
  #     * add a separate ``mcp`` service to this file — there is no second
  #       process serving MCP,
  #     * add a ``stripprefix`` middleware that removes ``/mcp`` — the ASGI
  #       dispatcher in ``config/asgi.py`` checks for the literal ``/mcp``
  #       prefix, and FastMCP's internal router also expects it intact.
  #       Stripping it turns every MCP request into a SPA catch-all HTML
  #       response.
  #   If a custom Traefik dynamic-config file for ``/mcp`` exists on the
  #   production host (e.g. ``/data/coolify/proxy/dynamic/abby-mcp.yaml``),
  #   it is a leftover from an earlier architecture and should be removed;
  #   it hard-codes the container name, which Coolify regenerates on every
  #   deploy.
  django:
    image: ${IMAGE_TAG:-the-abby-project}
    build:
      context: .
      dockerfile: Dockerfile
    command: sh -c "python manage.py backfill_accounts_history && python manage.py migrate --noinput && python manage.py loadrpgcontent && gunicorn config.asgi:application --bind 0.0.0.0:8000 --workers 3 --worker-class uvicorn.workers.UvicornWorker --timeout 120"
    volumes:
      # LLM-authored RPG content packs. The MCP ``write_pack_file`` tool
      # writes into this path; binding it to the repo on the host so
      # pack YAMLs survive container rebuilds AND are available for the
      # operator to git-commit if they want to promote a pack. The
      # initial/ directory stays baked into the image (NOT mounted) so
      # runtime writes can never clobber base content — MCP also blocks
      # writes to ``initial`` at the tool level as defense in depth.
      - ./content/rpg/packs:/app/content/rpg/packs
    expose:
      - "8000"
    env_file:
      - .env
    environment:
      SECRET_KEY: ${SECRET_KEY:-django-insecure-dev-key-change-me-in-production}
      DEBUG: ${DEBUG:-False}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-}
      DATABASE_URL: ${DATABASE_URL:-postgres://summerforge:changeme@db:5432/summerforge}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/1}
      PARENT_PASSWORD: ${PARENT_PASSWORD:-}
      CHILD_PASSWORD: ${CHILD_PASSWORD:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      MCP_PUBLIC_BASE_URL: ${MCP_PUBLIC_BASE_URL:-}
      MCP_ALLOWED_HOSTS: ${MCP_ALLOWED_HOSTS:-}
      MCP_ALLOWED_ORIGINS: ${MCP_ALLOWED_ORIGINS:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.2}
      SENTRY_RELEASE: ${SENTRY_RELEASE:-}
      USE_S3_STORAGE: ${USE_S3_STORAGE:-false}
      AWS_S3_ENDPOINT_URL: ${AWS_S3_ENDPOINT_URL:-}
      AWS_STORAGE_BUCKET_NAME: ${AWS_STORAGE_BUCKET_NAME:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_S3_REGION_NAME: ${AWS_S3_REGION_NAME:-us-east-1}
      AWS_QUERYSTRING_EXPIRE: ${AWS_QUERYSTRING_EXPIRE:-3600}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 120s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  celery_worker:
    image: ${IMAGE_TAG:-the-abby-project}
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A config worker -l info --concurrency 4
    env_file:
      - .env
    environment:
      SECRET_KEY: ${SECRET_KEY:-django-insecure-dev-key-change-me-in-production}
      DEBUG: ${DEBUG:-False}
      DATABASE_URL: ${DATABASE_URL:-postgres://summerforge:changeme@db:5432/summerforge}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/1}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.2}
      SENTRY_RELEASE: ${SENTRY_RELEASE:-}
      USE_S3_STORAGE: ${USE_S3_STORAGE:-false}
      AWS_S3_ENDPOINT_URL: ${AWS_S3_ENDPOINT_URL:-}
      AWS_STORAGE_BUCKET_NAME: ${AWS_STORAGE_BUCKET_NAME:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_S3_REGION_NAME: ${AWS_S3_REGION_NAME:-us-east-1}
      AWS_QUERYSTRING_EXPIRE: ${AWS_QUERYSTRING_EXPIRE:-3600}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A config inspect ping -d celery@$$HOSTNAME || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  celery_beat:
    image: ${IMAGE_TAG:-the-abby-project}
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file:
      - .env
    environment:
      SECRET_KEY: ${SECRET_KEY:-django-insecure-dev-key-change-me-in-production}
      DEBUG: ${DEBUG:-False}
      DATABASE_URL: ${DATABASE_URL:-postgres://summerforge:changeme@db:5432/summerforge}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/1}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'celery.*beat' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  postgres_data:
  redis_data:
