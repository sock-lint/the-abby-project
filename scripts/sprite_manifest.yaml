  green-tunic:            {col: 9,  row: 7}
  cloak:                  {col: 14, row: 7}

  # ── Cosmetic pet accessories (jewelry, row 8) ─────────────────────────
  ring:                   {col: 4,  row: 8}
  diamond-ring:           {col: 5,  row: 8}
  gold-necklace:          {col: 6,  row: 8}
  prayer-beads:           {col: 7,  row: 8}
