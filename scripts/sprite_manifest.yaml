# RPG sprite manifest — multi-sheet + loose-file schema.
#
# Each entry under ``sprites:`` maps a semantic slug (referenced by
# ``sprite_key`` in content YAML) to either:
#   (a) a sheet tile — {sheet: <id>, col: <c>, row: <r>}, where <id> is one of
#       the sheet ids declared under ``sheets:`` below, or
#   (b) a loose file — {file: "<repo-relative path>"}.
#
# Parser: apps/rpg/content/sprites.py::load_manifest
# Slicer: apps/rpg/content/sprites.py::slice_all
# Output: frontend/src/assets/rpg-sprites/<slug>.png
#
# Add new sprites by either (1) dropping new spritesheets under
# ``reward-icons/<pack>/`` and declaring them here, or (2) authoring loose
# PNGs under ``content/rpg/packs/<pack>/sprites/`` and listing the file
# path. The ``register_sprite_assets`` MCP tool drives both flows.
#
# Pack2 layout (shikashi sheet, 16×27 grid of 32×32 tiles):
#   Row  0       Status effects (11)
#   Row  1       Body icons (5)
#   Row  2       Buffs/debuffs (7)
#   Row  3       Special moves (16)
#   Row  4       Non-combat actions (9)
#   Rows 5-6     Weapons (28)
#   Rows 7-8     Clothing & armour (26)
#   Row  9       Healing items/potions (16)
#   Rows 10-13   General items (64)
#   Rows 14-15   Food (31)
#   Row 16       Fishing (15)
#   Row 17       Resources (11)
#   Row 18       Orbs (6)
#   Row 19       Flasks + cauldrons + horse + wooden beam (12)
#   Row 20       Wicker basket + 12 powders (13)
#   Row 21       Hand + 6 magic scrolls + 7 weather (14)

sheets:
  - id: shikashi
    file: reward-icons/pack2/#1 - Transparent Icons.png
    tile_size: 32

sprites:
  # ── Aquatic pets (row 16, fishing) ───────────────────────────────────
  tropical-fish:          {sheet: shikashi, col: 6,  row: 16}
  clownfish:              {sheet: shikashi, col: 7,  row: 16}
  jellyfish:              {sheet: shikashi, col: 8,  row: 16}
  octopus:                {sheet: shikashi, col: 9,  row: 16}
  turtle:                 {sheet: shikashi, col: 10, row: 16}
  eel:                    {sheet: shikashi, col: 5,  row: 16}
  fishing-rod:            {sheet: shikashi, col: 0,  row: 16}
  sunken-chest:           {sheet: shikashi, col: 14, row: 16}

  # ── Horse (mount, row 19) ─────────────────────────────────────────────
  horse:                  {sheet: shikashi, col: 10, row: 19}

  # ── Foods (rows 14-15) ────────────────────────────────────────────────
  apple:                  {sheet: shikashi, col: 0,  row: 14}
  banana:                 {sheet: shikashi, col: 1,  row: 14}
  pear:                   {sheet: shikashi, col: 2,  row: 14}
  lemon:                  {sheet: shikashi, col: 3,  row: 14}
  strawberry:             {sheet: shikashi, col: 4,  row: 14}
  grapes:                 {sheet: shikashi, col: 5,  row: 14}
  carrot:                 {sheet: shikashi, col: 6,  row: 14}
  sweetcorn:              {sheet: shikashi, col: 7,  row: 14}
  tomato:                 {sheet: shikashi, col: 9,  row: 14}
  red-chili:              {sheet: shikashi, col: 11, row: 14}
  food-mushroom:          {sheet: shikashi, col: 12, row: 14}
  loaf-of-bread:          {sheet: shikashi, col: 13, row: 14}
  chicken-leg:            {sheet: shikashi, col: 0,  row: 15}
  sirloin-steak:          {sheet: shikashi, col: 1,  row: 15}
  ham:                    {sheet: shikashi, col: 2,  row: 15}
  cooked-fish:            {sheet: shikashi, col: 4,  row: 15}
  eggs:                   {sheet: shikashi, col: 5,  row: 15}
  big-egg:                {sheet: shikashi, col: 6,  row: 15}
  cheese:                 {sheet: shikashi, col: 7,  row: 15}
  milk:                   {sheet: shikashi, col: 8,  row: 15}
  honey:                  {sheet: shikashi, col: 9,  row: 15}
  candy:                  {sheet: shikashi, col: 12, row: 15}
  cake:                   {sheet: shikashi, col: 13, row: 15}

  # ── Cosmetic frames (helmets, row 7) ─────────────────────────────────
  robin-hood-hat:         {sheet: shikashi, col: 0,  row: 7}
  barbute-helm:           {sheet: shikashi, col: 1,  row: 7}
  cross-helm:             {sheet: shikashi, col: 3,  row: 7}

  # ── Cosmetic themes (clothing, row 7) ────────────────────────────────
  blue-tunic:             {sheet: shikashi, col: 8,  row: 7}
  green-tunic:            {sheet: shikashi, col: 9,  row: 7}
  cloak:                  {sheet: shikashi, col: 14, row: 7}

  # ── Cosmetic pet accessories (jewelry, row 8) ─────────────────────────
  ring:                   {sheet: shikashi, col: 4,  row: 8}
  diamond-ring:           {sheet: shikashi, col: 5,  row: 8}
  gold-necklace:          {sheet: shikashi, col: 6,  row: 8}
  prayer-beads:           {sheet: shikashi, col: 7,  row: 8}
  tribal-necklace:        {sheet: shikashi, col: 8,  row: 8}

  # ── Coin pouches (row 12) ─────────────────────────────────────────────
  money-purse:            {sheet: shikashi, col: 6,  row: 12}
  bronze-coin-stack:      {sheet: shikashi, col: 8,  row: 12}
  silver-coin-stack:      {sheet: shikashi, col: 9,  row: 12}
  gold-coin-stack:        {sheet: shikashi, col: 10, row: 12}
  large-gold-coin-stack:  {sheet: shikashi, col: 11, row: 12}
  rupee:                  {sheet: shikashi, col: 15, row: 12}

  # ── Quest scrolls (row 13 + row 21) ───────────────────────────────────
  tied-scroll:            {sheet: shikashi, col: 10, row: 13}
  open-scroll:            {sheet: shikashi, col: 11, row: 13}
  magic-scroll-1:         {sheet: shikashi, col: 1,  row: 21}
  magic-scroll-2:         {sheet: shikashi, col: 2,  row: 21}
  magic-scroll-3:         {sheet: shikashi, col: 3,  row: 21}
  magic-scroll-4:         {sheet: shikashi, col: 4,  row: 21}
  magic-scroll-5:         {sheet: shikashi, col: 5,  row: 21}
  magic-scroll-6:         {sheet: shikashi, col: 6,  row: 21}

  # ── Potion backfill (row 9) ───────────────────────────────────────────
  # Row 9 layout: 4 normal (c0-c3), 4 upgraded (c4-c7), 4 rare (c8-c11), 3 brew (c12-c14), bandage (c15)
  potion-normal-red:      {sheet: shikashi, col: 0,  row: 9}
  potion-normal-blue:     {sheet: shikashi, col: 1,  row: 9}
  potion-upgraded-red:    {sheet: shikashi, col: 4,  row: 9}
  potion-upgraded-blue:   {sheet: shikashi, col: 5,  row: 9}
  potion-upgraded-green:  {sheet: shikashi, col: 6,  row: 9}
  potion-upgraded-gold:   {sheet: shikashi, col: 7,  row: 9}
  potion-rare-purple:     {sheet: shikashi, col: 8,  row: 9}
  potion-rare-cosmic:     {sheet: shikashi, col: 11, row: 9}
  potion-brew-earthy:     {sheet: shikashi, col: 12, row: 9}

  # ── Quest banner sprites ──────────────────────────────────────────────
  plant-pot-fully-grown:  {sheet: shikashi, col: 5,  row: 12}
  treasure-chest:         {sheet: shikashi, col: 11, row: 11}
  cauldron:               {sheet: shikashi, col: 9,  row: 19}
  cauldron-on-fire:       {sheet: shikashi, col: 8,  row: 19}
  spellbook:              {sheet: shikashi, col: 7,  row: 4}
