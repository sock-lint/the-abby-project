  potion-rare-cosmic:     {col: 11, row: 9}
  potion-brew-earthy:     {col: 12, row: 9}

  # ── Quest banner sprites ──────────────────────────────────────────────
  plant-pot-fully-grown:  {col: 5,  row: 12}
  treasure-chest:         {col: 11, row: 11}
  cauldron:               {col: 9,  row: 19}
  cauldron-on-fire:       {col: 8,  row: 19}
  spellbook:              {col: 7,  row: 4}
