server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Raise upload size so PDF ingestion / photo uploads still work through the proxy
    client_max_body_size 25m;

    # Shared proxy headers so Django sees the real host/scheme.
    # Works with SECURE_PROXY_SSL_HEADER + USE_X_FORWARDED_HOST in settings.py.
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_http_version 1.1;
    proxy_read_timeout 120s;

    # Same-origin Django proxy — lets the React bundle call relative /api URLs
    # so auth works from any network without CORS / private-network issues.
    location /api/    { proxy_pass http://django:8000; }
    location /admin/  { proxy_pass http://django:8000; }
    location /health  { proxy_pass http://django:8000; }
    location /static/ { proxy_pass http://django:8000; }
    location /media/  { proxy_pass http://django:8000; }

    # Long cache for hashed assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — let React Router handle client-side routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
