<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="wax" cx="35%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#e08a5c" />
      <stop offset="55%" stop-color="#a04a28" />
      <stop offset="100%" stop-color="#5c2411" />
    </radialGradient>
  </defs>
  <!-- Seal body -->
  <circle cx="32" cy="32" r="30" fill="url(#wax)" />
  <!-- Pressed inner ring -->
  <circle cx="32" cy="32" r="25" fill="none" stroke="#3a1708" stroke-width="0.75" opacity="0.5" />
  <!-- Monogram A (serif; dimensioned for 16px legibility down to ~a dark mark on the seal) -->
  <g fill="#2d1f15" fill-opacity="0.92">
    <!-- Left leg: outer-bottom, outer-top, inner-top (apex), inner-bottom -->
    <polygon points="16,44 28,20 32,20 20,44" />
    <!-- Right leg: inner-top (apex), outer-top, outer-bottom, inner-bottom -->
    <polygon points="32,20 36,20 48,44 44,44" />
    <!-- Crossbar (overlaps both legs for clean join) -->
    <rect x="22" y="32" width="20" height="2.5" />
    <!-- Left foot serif -->
    <rect x="13" y="43.5" width="10" height="2.5" />
    <!-- Right foot serif -->
    <rect x="41" y="43.5" width="10" height="2.5" />
  </g>
</svg>
