<svg xmlns="http://www.w3.org/2000/svg" width="480" height="480" viewBox="0 0 480 480">
  <defs>
    <filter id="parchment" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="3" seed="7" stitchTiles="stitch" />
      <feColorMatrix values="0 0 0 0 0.35
                             0 0 0 0 0.27
                             0 0 0 0 0.15
                             0 0 0 0.45 0" />
    </filter>
    <filter id="fibers" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="turbulence" baseFrequency="0.015 0.9" numOctaves="2" seed="3" />
      <feColorMatrix values="0 0 0 0 0.40
                             0 0 0 0 0.30
                             0 0 0 0 0.18
                             0 0 0 0.25 0" />
    </filter>
  </defs>
  <rect width="480" height="480" fill="transparent" filter="url(#parchment)" />
  <rect width="480" height="480" fill="transparent" filter="url(#fibers)" opacity="0.55" />
</svg>
