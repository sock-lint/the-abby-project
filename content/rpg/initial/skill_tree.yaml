# Skill tree — categories, subjects, skills, and prerequisites.
#
# Schema:
#   categories:
#     - name        (required, unique)
#       icon        (optional)
#       color       (optional hex, default "#888888")
#       description (optional)
#   subjects:         # intermediate grouping Category -> Subject -> Skill
#     - name        (required, unique per category)
#       category    (required, category name)
#       icon        (optional)
#       order       (optional, default 0)
#       description (optional)
#   skills:
#     - name        (required; unique within category)
#       category    (required, category name)
#       subject     (optional, subject name — must exist under the same category)
#       icon        (optional)
#       locked      (optional, default false) — is_locked_by_default
#       order       (optional, default 0)
#       levels      (optional mapping: "1" → "Beginner", "5" → "Master")
#       prereqs:    (optional list)
#         - "Other Skill Name"                      # same category, level 2
#         - skill: "Other Skill Name", level: 3     # same category, level 3
#         - "Woodworking::Measuring & Marking"      # cross-category, level 2
#         - skill: "Woodworking::Hand Tools", level: 2

