# Pet species — each entry auto-materializes both a PetSpecies row AND an
# egg ItemDefinition (type=egg) with typed FK back to the species. Authoring
# a new pet is one entry here; the loader handles the fan-out.
#
# Schema per entry:
#   slug               (required, unique)
#   name               (required) — display name
#   icon               (optional, default "")
#   sprite_key         (optional) — bundled pixel-art sprite slug
#   description        (optional)
#   food_preference    (optional) — food slug this species prefers (+15 growth)
#   available_potions  (optional list) — potion slugs this species can hatch with;
#                       empty = all potions currently in the catalog
#   egg_name           (optional) — overrides "{name} Egg"
#   egg_icon           (optional, default "🥚")
#   egg_sprite_key     (optional, default "big-egg") — sprite for the egg item
#   egg_rarity         (optional, default "common")
#   egg_coin_value     (optional, default 3)

species:
  # ── Original 8 ─────────────────────────────────────────────────────────
  - slug: wolf
    name: Wolf
    icon: "🐺"
    sprite_key: wolf
    description: A loyal pack hunter
    food_preference: meat
    egg_rarity: common
    egg_coin_value: 3

  - slug: dragon
    name: Dragon
    icon: "🐉"
    sprite_key: dragon
    description: A fierce fire-breather
    food_preference: fish
    egg_rarity: uncommon
