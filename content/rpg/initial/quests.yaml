# Sample quest definitions.
#
# Schema per entry:
#   name             (required, unique)
#   description      (required)
#   icon             (optional, default "⚔️")
#   sprite_key       (optional) — bundled pixel-art sprite slug
#   quest_type       (required) — "boss" | "collection"
#   target_value     (required) — HP for boss, count for collection
#   duration_days    (optional, default 7)
#   trigger_filter   (optional JSON) — whitelist triggers, filter by project/
#                    chore/etc. Empty = all triggers count.
#   required_badge   (optional, badge name) — gates quest until earned
#   coin_reward      (optional, default 0)
#   xp_reward        (optional, default 0)
#   is_repeatable    (optional, default false)
#   is_system        (optional, default true)
#   reward_items:    (optional list)
#     - slug: <item-slug>
#       quantity: 1
#   skill_tags:      (optional list) — declares which skills this quest
#                    exercises. Quest's ``xp_reward`` is split across
#                    them by weight. Entries are either "Skill Name"
#                    (unique) or "Category::Skill Name" (disambiguated),
#                    optionally wrapped in a {skill, weight} mapping.
#
# ── Reward rubric (informal — not validated, just a guide) ──────────────
# Boss quests cluster into three loose tiers based on damage × duration.
# Use these as a starting point when authoring; tweak for theme/difficulty.
#
#   Tier      Damage    Duration   coin_reward   xp_reward   item rewards
#   ────      ──────    ────────   ───────────   ─────────   ────────────
#   Easy       150–250  10–14d     80–100        120–180     1 cosmetic / scroll
#   Standard   250–400  14–21d     120–180       180–250     1 cosmetic + 1 utility
#   Epic       400–800  21–30d+    250–500       300–500+    Frame/title cosmetic
#
# Collection quests scale rewards by target × duration similarly. Examples
# of well-balanced quests at each tier: Easy = Apprentice Path; Standard =
# Cold Snap, Coder's Crucible; Epic = Phoenix Rising, Master's Path.

quests:
  # 2026-04-23 review — rewards bumped to match the difficulty curve. Dragon
  # Slayer asks for 500 damage in 7 days (the most aggressive damage/day ratio
  # of any boss); the prior 50c/100xp paid like a low-tier collection quest.
  # New 150c/200xp lands it between Treasure Hunter (400dmg/10d→100c/200xp)
  # and Phoenix Rising (500dmg/30d→250c/300xp).
  - name: Dragon Slayer
    description: The dragon returns every season — a blitz boss. One week to deal 500 damage. Every trigger counts. Best paired with a Scholar's Draught or Drop Charm.
    icon: "🐉"
    sprite_key: quest-dragon-slayer
    quest_type: boss
    target_value: 500
    duration_days: 7
    coin_reward: 150
    xp_reward: 200
    is_system: true
    reward_items:
      - slug: dragon-egg
        quantity: 1
    skill_tags:
      - {skill: "Life Skills::Persistence", weight: 3}
      - {skill: "Life Skills::Time Management", weight: 1}

