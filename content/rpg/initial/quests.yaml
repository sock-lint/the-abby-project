# Sample quest definitions.
#
# Schema per entry:
#   name             (required, unique)
#   description      (required)
#   icon             (optional, default "⚔️")
#   sprite_key       (optional) — bundled pixel-art sprite slug
#   quest_type       (required) — "boss" | "collection"
#   target_value     (required) — HP for boss, count for collection
#   duration_days    (optional, default 7)
#   trigger_filter   (optional JSON) — whitelist triggers, filter by project/
#                    chore/etc. Empty = all triggers count.
#   required_badge   (optional, badge name) — gates quest until earned
#   coin_reward      (optional, default 0)
#   xp_reward        (optional, default 0)
#   is_repeatable    (optional, default false)
#   is_system        (optional, default true)
#   reward_items:    (optional list)
#     - slug: <item-slug>
#       quantity: 1

quests:
  - name: Dragon Slayer
    description: Deal 500 damage to the mighty dragon by completing tasks!
    icon: "🐉"
    quest_type: boss
    target_value: 500
    duration_days: 7
    coin_reward: 50
    xp_reward: 100
    is_system: true
    reward_items:
      - slug: wolf-egg
        quantity: 1

  - name: Feather Collector
    description: Collect 10 phoenix feathers by completing any tasks.
    icon: "🪶"
    quest_type: collection
    target_value: 10
    duration_days: 5
    coin_reward: 25
    xp_reward: 50
    is_system: true

  - name: Chore Champion
    description: Complete 15 chores to prove your household mastery!
    icon: "🏆"
    quest_type: collection
    target_value: 15
    duration_days: 7
    trigger_filter:
      allowed_triggers: [chore_complete]
    coin_reward: 30
    xp_reward: 75
    is_system: true

  - name: Focus Master
    description: Clock 20 hours of focused project work to defeat the distraction monster!
    icon: "🧠"
    quest_type: boss
    target_value: 200
    duration_days: 14
    trigger_filter:
      allowed_triggers: [clock_out]
    coin_reward: 75
    xp_reward: 150
    is_system: true
    reward_items:
      - slug: wolf-egg
        quantity: 1

  # ── New pixel-art quests ────────────────────────────────────────────────
  - name: Angler's Bounty
    description: Earn drops from your daily efforts and reel in 5 fish-themed treasures.
    icon: "🎣"
    sprite_key: fishing-rod
    quest_type: collection
    target_value: 5
    duration_days: 7
    trigger_filter:
      allowed_triggers: [clock_out, chore_complete, homework_complete, milestone_complete]
    coin_reward: 40
    xp_reward: 80
    is_system: true
    reward_items:
      - slug: pouch-large
        quantity: 1
      - slug: clownling-egg
        quantity: 1

  - name: Backyard Botanist
    description: Care for 3 things and watch your garden quest grow to bloom.
    icon: "🌱"
    sprite_key: plant-pot-fully-grown
    quest_type: collection
    target_value: 3
    duration_days: 10
    trigger_filter:
      allowed_triggers: [chore_complete, milestone_complete]
    coin_reward: 35
    xp_reward: 70
    is_system: true
    reward_items:
      - slug: accessory-tribal-necklace
        quantity: 1

  - name: Iron Chef
    description: Stock the pantry — collect 10 food drops to win the cook-off!
    icon: "🍳"
    sprite_key: cauldron-on-fire
    quest_type: collection
    target_value: 10
    duration_days: 7
    trigger_filter:
      allowed_triggers: [clock_out, chore_complete, homework_complete, milestone_complete, habit_log]
    coin_reward: 45
    xp_reward: 90
    is_system: true
    reward_items:
      - slug: scroll-amber
        quantity: 1

  - name: Treasure Hunter
    description: Strike 400 damage against the locked vault to claim the hoard within!
    icon: "💎"
    sprite_key: treasure-chest
    quest_type: boss
    target_value: 400
    duration_days: 10
    trigger_filter:
      allowed_triggers: [chore_complete, homework_complete, clock_out]
    coin_reward: 100
    xp_reward: 200
    is_system: true
    reward_items:
      - slug: pouch-treasure
        quantity: 1
