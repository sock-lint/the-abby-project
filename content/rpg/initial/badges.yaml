  # Rare / Fun — all three fixed to use real criteria.
  # Night Owl previously claimed "before 8 AM" but used bare first_clock_in
  # with empty criteria_value, so the time check never ran. Split into two:
  # Early Bird (before 8 AM) and Night Owl (after 9 PM), each on a real
  # time-of-day criterion.
  - name: Early Bird
    description: Clock in before 8 AM
    icon: "🌅"
