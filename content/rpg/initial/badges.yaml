# Badges — awarded when criteria are met; trigger coin bonuses via RPG loop.
#
# Schema per entry:
#   name            (required, unique)
#   description     (required)
#   icon            (optional)
#   criteria_type   (required) — one of the Badge.CriteriaType choices
#   criteria_value  (optional mapping, default {})
#   xp_bonus        (optional, default 0)
#   rarity          (optional, default "common")

badges:
  # Getting Started
  - name: First Clock-In
    description: Clock in for the first time
    icon: "⏰"
    criteria_type: first_clock_in
    criteria_value: {}
    rarity: common
    xp_bonus: 10
