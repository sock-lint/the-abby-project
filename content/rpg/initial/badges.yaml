    criteria_value: {count: 15}
    rarity: epic
    xp_bonus: 100
  - name: Deep Dive
    description: Reach Level 4 in any single skill
    icon: "💠"
    criteria_type: skill_level_reached
    criteria_value: {level: 4, count: 1}
    rarity: rare
    xp_bonus: 50
  - name: Mastery
    description: Reach Level 5 in any single skill
    icon: "💎"
    criteria_type: skill_level_reached
    criteria_value: {level: 5, count: 1}
    rarity: epic
    xp_bonus: 100
  - name: Double Mastery
    description: Reach Level 5 in two skills
    icon: "💎💎"
