# Free-form items — food, cosmetics, coin pouches, quest scrolls.
#
# NOTE: Eggs are NOT here — they're auto-generated from pet_species.yaml.
#       Potions are NOT here — they're auto-generated from potion_types.yaml.
#
# Schema per entry:
#   slug           (required, unique)
#   name           (required)
#   icon           (optional)
#   item_type      (required) — food|cosmetic_frame|cosmetic_title|cosmetic_theme|
#                                cosmetic_pet_accessory|coin_pouch|quest_scroll
#   rarity         (optional, default "common")
#   coin_value     (optional, default 0)
#   metadata       (optional mapping) — free-form bag for type-specific fields
#   food_species   (optional, for food items) — species slug that prefers this food

items:
  # Pet Food ---------------------------------------------------------------
  - slug: food-meat
    name: Meat
    icon: "🥩"
    item_type: food
    rarity: common
    coin_value: 1
    metadata: {food_type: meat, growth: 5}
    food_species: wolf

  - slug: food-fish
    name: Fish
    icon: "🐟"
    item_type: food
    rarity: common
