  # metadata.effect. Add a new entry below AND the matching branch there.
  - slug: streak-freeze
    name: Streak Freeze
    icon: "❄️"
    sprite_key: reward-streak-freeze
    item_type: consumable
    rarity: rare
    coin_value: 30
