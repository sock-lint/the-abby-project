# Drop tables — link triggers to items with a weighted probability.
#
# Two ways to express rules:
#
# 1. Explicit `rules` — exact trigger + item list + weight:
#      - triggers: [milestone_complete]
#        item_slugs: [pouch-large]
#        weight: 3
#
# 2. `macros` — sweep a whole item_type across a set of triggers, with
#    optional per-rarity weighting. This mirrors how the old seed_data.py
#    wired up the tables in ~30 lines of Python.
#
# Loader runs rules first, then macros. Both are idempotent.

macros:
  # Eggs, potions, coin pouches drop from all the frequent triggers.
  # Weight-by-rarity: common 10 → legendary 1 (mirrors _create_item_catalog).
  - triggers: [clock_out, chore_complete, homework_complete, milestone_complete, project_complete, habit_log]
    item_type: egg
    weight_by_rarity: {common: 10, uncommon: 5, rare: 2, epic: 1, legendary: 1}

  - triggers: [clock_out, chore_complete, homework_complete, milestone_complete, project_complete, habit_log]
    item_type: potion
    weight_by_rarity: {common: 10, uncommon: 5, rare: 2, epic: 1, legendary: 1}

  # Coin pouches at 2x base weight.
  - triggers: [clock_out, chore_complete, homework_complete, milestone_complete, project_complete, habit_log]
    item_type: coin_pouch
    weight_by_rarity: {common: 20, uncommon: 10, rare: 4, epic: 2, legendary: 2}

  # Food drops frequently (weight-scaled by rarity now we have many tiers).
  - triggers: [clock_out, chore_complete, homework_complete, milestone_complete, project_complete, habit_log]
    item_type: food
    weight_by_rarity: {common: 15, uncommon: 6, rare: 2, epic: 1, legendary: 1}

  # Homework-created (first log of the day) rolls a smaller table — just
  # food and common coin pouches. Keeps the reward a gentle nudge rather
  # than a farming opportunity; the rate is also low (0.15) in BASE_DROP_RATES.
  - triggers: [homework_created]
    item_type: food
    weight_by_rarity: {common: 10, uncommon: 3}
  - triggers: [homework_created]
    item_type: coin_pouch
    weight_by_rarity: {common: 10, uncommon: 3}

  # Cosmetics only drop from high-value triggers.
  # project_complete is the biggest accomplishment — it's included so finishing
  # a whole project is as likely to yield a cosmetic as a milestone.
  - triggers: [milestone_complete, project_complete, badge_earned, perfect_day, quest_complete]
    item_type_startswith: cosmetic_
    weight_by_rarity: {common: 10, uncommon: 5, rare: 2, epic: 1, legendary: 1}

  # Quest scrolls drop from milestone/project/badge/quest/perfect triggers —
  # they're a ladder reward that lets players queue up future quests.
  - triggers: [milestone_complete, project_complete, badge_earned, quest_complete, perfect_day]
    item_type: quest_scroll
    weight_by_rarity: {uncommon: 4, rare: 2, epic: 1, legendary: 1}

  # Savings-goal completion (rate 0.80 in BASE_DROP_RATES). Pre-2026-04-23 the
  # rate was set but no items were eligible — drops never fired. Coin pouches
  # + a chance at a quest scroll match the celebratory tone without flooding
  # the cosmetic pool from a parent-controlled trigger.
  - triggers: [savings_goal_complete]
    item_type: coin_pouch
    weight_by_rarity: {common: 10, uncommon: 6, rare: 3, epic: 1}
  - triggers: [savings_goal_complete]
    item_type: quest_scroll
    weight_by_rarity: {uncommon: 3, rare: 2, epic: 1}

rules:
  # Streak Freeze drops rarely from milestone/project completions — the
  # expected player path is earn → save → spend on a missed day. If drops
  # feel too scarce, the reward shop also stocks it.
  - triggers: [milestone_complete, project_complete, badge_earned, perfect_day]
    item_slugs: [streak-freeze]
    weight: 2
