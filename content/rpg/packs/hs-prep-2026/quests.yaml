quests:
  - slug: summer-prep-arc
    name: The Summer Before High School
    description: A 90-day quest to build rock-solid habits before freshman year. Every habit tap, chore, and assignment chips away at the boss.
    quest_type: boss
    target_value: 800
    duration_days: 90
    coin_reward: 500
    xp_reward: 400
    is_repeatable: false
    reward_items:
      - slug: frame-high-school-trophy
