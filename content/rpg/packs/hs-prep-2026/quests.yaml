      - slug: title-freshman-warrior
        quantity: 1
    skill_tags:
      - {skill: "Life Skills::Persistence", weight: 3}
      - {skill: "Life Skills::Project Planning", weight: 2}
      - {skill: "Life Skills::Time Management", weight: 2}

  - slug: first-week-freshman
    name: First Week of Freshman Year
    description: Survive the first week of high school by keeping the routine alive. Log 5 habits to clear it.
    quest_type: collection
    target_value: 5
    duration_days: 7
    coin_reward: 200
    xp_reward: 150
    is_repeatable: false
    trigger_filter:
      allowed_triggers: [habit_log]
    reward_items:
      - slug: accessory-backpack-charm
        quantity: 1
    skill_tags:
      - {skill: "Life Skills::Persistence", weight: 2}
      - {skill: "Life Skills::Time Management", weight: 2}
