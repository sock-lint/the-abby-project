<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Not authorized — Abby</title>
<style>
  :root { --ink:#2d1f15; --whisper:#8a7560; --page:#f3e7cd; --aged:#e9d9b6; --ember:#a23a1a; }
  body { margin:0; font-family:Georgia, "Times New Roman", serif; background:var(--page); color:var(--ink); min-height:100vh; display:grid; place-items:center; padding:24px; }
  .card { background:var(--aged); border:1px solid #c8a763; border-radius:6px; padding:32px; max-width:480px; box-shadow:0 8px 24px rgba(45,31,21,.15); text-align:center; }
  h1 { margin:0 0 8px; font-size:22px; color:var(--ember); }
  p { color:var(--ink); line-height:1.6; }
  a { color:#5b6a3e; }
</style>
</head>
<body>
<div class="card">
  <h1>Not authorized</h1>
  <p>{{ reason|default:"This account isn't allowed to grant MCP access." }}</p>
  <p>Only staff parents can connect MCP clients. If you need access, ask the family's deployment owner.</p>
  <p><a href="/">Return to Abby</a></p>
</div>
</body>
</html>
