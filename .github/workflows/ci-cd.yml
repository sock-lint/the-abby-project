name: CI/CD Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  frontend-test:
    runs-on: [self-hosted, deploy-platform]
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Test with coverage
        run: npm run test:coverage

  backend-test:
    runs-on: [self-hosted, deploy-platform]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: summerforge_test
          POSTGRES_USER: summerforge
          POSTGRES_PASSWORD: summerforge
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U summerforge"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      SECRET_KEY: ci-test-secret-key-not-for-production
      DEBUG: "False"
      DATABASE_URL: postgres://summerforge:summerforge@localhost:5432/summerforge_test
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/1
      ALLOWED_HOSTS: localhost,127.0.0.1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run migrations
        run: python manage.py migrate --noinput
      - name: Run tests
        run: python manage.py test --verbosity=2

  build:
    needs: [frontend-test, backend-test]
    runs-on: [self-hosted, deploy-platform]
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - id: tag
        run: echo "tag=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Django image
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }} \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            --build-arg VITE_SENTRY_DSN=${{ secrets.VITE_SENTRY_DSN }} \
            --build-arg VITE_SENTRY_ENVIRONMENT=production \
            --build-arg VITE_SENTRY_RELEASE=${{ steps.tag.outputs.tag }} \
            --build-arg SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }} \
            --build-arg SENTRY_ORG=${{ secrets.SENTRY_ORG }} \
            --build-arg SENTRY_PROJECT=${{ secrets.SENTRY_PROJECT }} \
            --label "org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}" \
            -f Dockerfile .

      - name: Push images
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  scan:
    needs: build
    runs-on: [self-hosted, deploy-platform]
    steps:
      - uses: actions/checkout@v4
      - name: Trivy scan
        run: |
          trivy image --severity "CRITICAL,HIGH" --ignore-unfixed --exit-code 1 --format table \
            --ignorefile .trivyignore \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.image_tag }}

  deploy:
    needs: [build, scan]
    runs-on: [self-hosted, deploy-platform]
    steps:
      - uses: actions/checkout@v4

      - name: Deploy
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: |
          TAG="${{ needs.build.outputs.image_tag }}"
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${TAG}"
          TARGET="root@192.168.4.67"
          DIR="/opt/the-abby-project"
          SSH="ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=10"

          echo "=== Pulling image ==="
          ${SSH} ${TARGET} "docker pull ${IMAGE}"

          echo "=== Capturing rollback state ==="
          PREV=$(${SSH} ${TARGET} "cd ${DIR} && docker compose ps django --format json 2>/dev/null | head -1 | jq -r '.Image' 2>/dev/null" || echo "none")
          echo "Previous: ${PREV}"

          echo "=== Syncing compose file ==="
          scp -o StrictHostKeyChecking=accept-new -o ConnectTimeout=10 docker-compose.yml ${TARGET}:${DIR}/

          echo "=== Starting infrastructure ==="
          ${SSH} ${TARGET} "cd ${DIR} && IMAGE_TAG=${IMAGE} docker compose up -d --no-recreate db redis"
          sleep 8

          echo "=== Running migrations ==="
          ${SSH} ${TARGET} "cd ${DIR} && IMAGE_TAG=${IMAGE} docker compose run --rm django python manage.py migrate --noinput" || {
            echo "::error::Migrations failed — aborting"
            exit 1
          }

          echo "=== Loading RPG content ==="
          ${SSH} ${TARGET} "cd ${DIR} && IMAGE_TAG=${IMAGE} docker compose run --rm django python manage.py loadrpgcontent" || {
            echo "::error::RPG content load failed — aborting"
            exit 1
          }

          echo "=== Cleaning up retired catalog rows ==="
          # Idempotent — retires DB rows whose YAML entries have been
          # deleted (the loader is upsert-only and can't remove them).
          # Each cleanup step filters by name/slug allowlists in the
          # command source; subsequent deploys delete 0 rows.
          ${SSH} ${TARGET} "cd ${DIR} && IMAGE_TAG=${IMAGE} docker compose run --rm django python manage.py cleanup_rpg_catalog" || {
            echo "::error::Catalog cleanup failed — aborting"
            exit 1
          }

          echo "=== Setting Sentry release ==="
          ${SSH} ${TARGET} "cd ${DIR} && grep -q '^SENTRY_RELEASE=' .env 2>/dev/null && sed -i 's/^SENTRY_RELEASE=.*/SENTRY_RELEASE=${TAG}/' .env || echo 'SENTRY_RELEASE=${TAG}' >> .env" || true

          echo "=== Deploying app services ==="
          for svc in django celery_worker celery_beat; do
            echo "  → ${svc}"
            ${SSH} ${TARGET} "cd ${DIR} && IMAGE_TAG=${IMAGE} docker compose up -d --no-deps --force-recreate ${svc}"
            sleep 5
          done

          echo "=== Health check ==="
          HEALTHY=false
          for i in $(seq 1 30); do
            if ${SSH} ${TARGET} "curl -sf -o /dev/null --max-time 5 http://localhost:8000/health"; then
              HEALTHY=true
              echo "Health check passed on attempt ${i}"
              break
            fi
            echo "Attempt ${i}/30..."
            sleep 5
          done

          if [ "${HEALTHY}" = "true" ]; then
            echo "✅ Deploy successful!"
            ${SSH} ${TARGET} "docker image prune -f --filter 'until=24h'" || true

            # Notify Sentry of the deployment
            if [ -n "${SENTRY_AUTH_TOKEN}" ]; then
              SENTRY_URL="https://logs.neato.digital"
              echo "=== Notifying Sentry of deployment ==="
              # Associate commits with the release
              curl -sf -X PUT \
                -H "Authorization: Bearer ${SENTRY_AUTH_TOKEN}" \
                -H "Content-Type: application/json" \
                -d "{\"version\":\"${TAG}\",\"refs\":[{\"repository\":\"${{ github.repository }}\",\"commit\":\"${{ github.sha }}\"}],\"projects\":[\"${SENTRY_PROJECT}\"]}" \
                "${SENTRY_URL}/api/0/organizations/${SENTRY_ORG}/releases/" || true
              # Create deploy record
              curl -sf -X POST \
                -H "Authorization: Bearer ${SENTRY_AUTH_TOKEN}" \
                -H "Content-Type: application/json" \
                -d "{\"environment\":\"production\",\"name\":\"${TAG}\"}" \
                "${SENTRY_URL}/api/0/organizations/${SENTRY_ORG}/releases/${TAG}/deploys/" || true
            fi

            if [ -n "${DISCORD_WEBHOOK_URL}" ]; then
              curl -sf -X POST -H "Content-Type: application/json" \
                -d "{\"embeds\":[{\"description\":\"✅ **the-abby-project** deployed\nImage: \`${TAG}\`\",\"color\":3066993,\"timestamp\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}]}" \
                "${DISCORD_WEBHOOK_URL}" || true
            fi
          else
            echo "::error::Health check failed!"
            ${SSH} ${TARGET} "cd ${DIR} && docker compose logs --tail 50 django" || true
            if [ "${PREV}" != "none" ] && [ -n "${PREV}" ]; then
              echo "Rolling back to ${PREV}..."
              for svc in django celery_worker celery_beat; do
                ${SSH} ${TARGET} "cd ${DIR} && IMAGE_TAG=${PREV} docker compose up -d --no-deps --force-recreate ${svc}"
              done
            fi
            if [ -n "${DISCORD_WEBHOOK_URL}" ]; then
              curl -sf -X POST -H "Content-Type: application/json" \
                -d "{\"embeds\":[{\"description\":\"❌ **the-abby-project** deploy failed — rolled back\nBad: \`${TAG}\`\",\"color\":15158332}]}" \
                "${DISCORD_WEBHOOK_URL}" || true
            fi
            exit 1
          fi
